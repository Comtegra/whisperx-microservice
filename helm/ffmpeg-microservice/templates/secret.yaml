{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ffmpeg-microservice.fullname" . }}
  labels:
    {{- include "ffmpeg-microservice.labels" . | nindent 4 }}
type: Opaque
stringData:
  HF_TOKEN: {{ .Values.secrets.hfToken | quote }}
  APP_TOKEN: {{ .Values.secrets.appToken | quote }}
{{- end }}
